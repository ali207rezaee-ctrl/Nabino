<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پشتیبانی نابینو</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#0b0b14;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
padding:15px;
text-align:center;
background:rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
font-size:16px;
color:#c084fc;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

/* MESSAGE */
.msg{
max-width:75%;
padding:10px;
border-radius:14px;
font-size:14px;
line-height:1.5;
animation:pop 0.2s ease;
}

@keyframes pop{
from{transform:scale(0.9);opacity:0;}
to{transform:scale(1);opacity:1;}
}

/* USER */
.me{
background:#7c3aed;
align-self:flex-end;
}

/* SUPPORT */
.support{
background:rgba(255,255,255,0.08);
align-self:flex-start;
}

/* INPUT */
.inputBox{
display:flex;
padding:10px;
gap:8px;
background:rgba(0,0,0,0.6);
backdrop-filter: blur(10px);
}

input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
outline:none;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#7c3aed;
color:white;
cursor:pointer;
}

button:active{
transform:scale(0.95);
}
</style>
</head>

<body>

<div class="header">💬 پشتیبانی آنلاین نابینو</div>

<div id="chat" class="chat"></div>

<div class="inputBox">
<input id="text" placeholder="پیام خود را بنویس...">
<button onclick="send()">ارسال</button>
</div>

<script>

const chat = document.getElementById("chat");

/* اضافه کردن پیام */
function addMsg(text,type){
chat.innerHTML += `
<div class="msg ${type}">${text}</div>
`;
chat.scrollTop = chat.scrollHeight;
}

/* ارسال پیام */
async function send(){
let input = document.getElementById("text");
let text = input.value;
if(!text) return;

addMsg(text,"me");
input.value="";

/* ارسال به ربات (بعداً وصل میشه) */
try{
await fetch("YOUR_BOT_URL/sendMessage",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:text,
user_id: window.Telegram?.WebApp?.initDataUnsafe?.user?.id
})
});
}catch(e){
addMsg("❌ خطا در ارسال پیام","support");
return;
}

/* حالت انتظار */
setTimeout(()=>{
addMsg("⏳ پیام شما به پشتیبانی ارسال شد","support");
},500);
}

</script>

</body>
</html>
