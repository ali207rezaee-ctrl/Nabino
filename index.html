<!DOCTYPE html><html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>نابینو</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma,sans-serif;
}

body{
background:#2a0050;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#gameContainer{
position:relative;
width:360px;
height:640px;
overflow:hidden;
border-radius:20px;
background:linear-gradient(to bottom,#5f1b99,#2b004f);
box-shadow:0 0 25px rgba(180,80,255,.6);
}

canvas{
display:block;
}

#startScreen,
#gameOver{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.45);
color:white;
z-index:10;
text-align:center;
padding:20px;
}

.hidden{
display:none !important;
}

h1{
font-size:42px;
margin-bottom:15px;
text-shadow:0 0 15px #d29cff;
}

button{
border:none;
padding:12px 25px;
border-radius:12px;
font-size:18px;
cursor:pointer;
background:#a84cff;
color:white;
margin-top:15px;
}

button:active{
transform:scale(.97);
}

#scoreBox{
position:absolute;
top:10px;
left:0;
right:0;
text-align:center;
color:#fff;
font-size:24px;
font-weight:bold;
text-shadow:0 0 10px #fff;
z-index:5;
}

#message{
position:absolute;
top:70px;
width:100%;
text-align:center;
color:#fff;
font-size:22px;
font-weight:bold;
text-shadow:0 0 10px #fff;
z-index:5;
}
</style></head><body><div id="gameContainer"><div id="scoreBox">0</div>
<div id="message"></div><div id="startScreen">
<h1>نابینو</h1>
<p>برای پرواز لمس کن</p>
<button onclick="startGame()">شروع بازی</button>
</div><div id="gameOver" class="hidden">
<h2>بازی تمام شد 😅</h2>
<br>
<p id="finalScore"></p>
<p id="bestScore"></p>
<button onclick="restartGame()">شروع مجدد</button>
</div><canvas id="game" width="360" height="640"></canvas>

</div><script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreBox = document.getElementById("scoreBox");
const messageBox = document.getElementById("message");

let bird;
let pipes;
let score;
let gameRunning=false;
let animation;

const messages=[
"عالیه! 🟣",
"نابی شدی! 💜",
"ترکوندی! 🚀",
"ادامه بده! 🔥",
"قهرمان ناب! 👑",
"فوق‌العاده بود! ⭐",
"دمت گرم! 😎"
];

function init(){

bird={
x:90,
y:250,
size:18,
velocity:0
};

pipes=[];

score=0;

scoreBox.innerText="0";

for(let i=0;i<3;i++){

createPipe(450+(i*220));

}
}

function createPipe(x){

const gap=150;

const topHeight=
Math.random()*220+80;

pipes.push({
x:x,
top:topHeight,
bottom:topHeight+gap,
passed:false
});

}

function startGame(){

document
.getElementById("startScreen")
.classList.add("hidden");

document
.getElementById("gameOver")
.classList.add("hidden");

init();

gameRunning=true;

update();

}

function restartGame(){

cancelAnimationFrame(animation);

startGame();

}

function update(){

if(!gameRunning) return;

animation=requestAnimationFrame(update);

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

bird.velocity+=0.4;
bird.y+=bird.velocity;

ctx.beginPath();
ctx.fillStyle="#d58cff";
ctx.shadowBlur=15;
ctx.shadowColor="#fff";
ctx.arc(
bird.x,
bird.y,
bird.size,
0,
Math.PI*2
);
ctx.fill();

ctx.shadowBlur=0;

for(let pipe of pipes){

pipe.x-=3;

ctx.fillStyle="#7b2dff";

ctx.fillRect(
pipe.x,
0,
55,
pipe.top
);

ctx.fillRect(
pipe.x,
pipe.bottom,
55,
640-pipe.bottom
);

if(
bird.x+bird.size>pipe.x &&
bird.x-bird.size<pipe.x+55 &&
(
bird.y-bird.size<pipe.top ||
bird.y+bird.size>pipe.bottom
)
){

endGame();

}

if(
!pipe.passed &&
pipe.x+55<bird.x
){

pipe.passed=true;

score++;

scoreBox.innerText=score;

if(score%2===0){

showMessage(
messages[
Math.floor(
Math.random()*
messages.length
)
]
);

}

}

}

if(
pipes[0].x<-60
){

pipes.shift();

createPipe(
pipes[pipes.length-1].x+220
);

}

if(
bird.y<0 ||
bird.y>640
){

endGame();

}

}

function showMessage(text){

messageBox.innerText=text;

setTimeout(()=>{
messageBox.innerText="";
},1200);

}

function endGame(){

gameRunning=false;

cancelAnimationFrame(animation);

let best=
localStorage.getItem("nabino_best") || 0;

if(score>best){

best=score;

localStorage.setItem(
"nabino_best",
score
);

}

document
.getElementById("finalScore")
.innerText=
"امتیاز: "+score;

document
.getElementById("bestScore")
.innerText=
"رکورد: "+best;

document
.getElementById("gameOver")
.classList.remove("hidden");

}

function flap(){

if(!gameRunning) return;

bird.velocity=-7;

}

canvas.addEventListener(
"click",
flap
);

document.addEventListener(
"touchstart",
()=>{
if(gameRunning){
bird.velocity=-7;
}
}
);

</script></body>
</html>
