<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نابینو | Crypto Dashboard</title>

<style>
body{
margin:0;
font-family:tahoma;
background:linear-gradient(#120022,#2a004f);
color:white;
display:flex;
justify-content:center;
}

#app{
width:360px;
min-height:640px;
padding:15px;
}

h1{
text-align:center;
color:#d6a3ff;
text-shadow:0 0 10px #a855f7;
}

.card{
background:rgba(255,255,255,0.06);
padding:12px;
margin:10px 0;
border-radius:12px;
box-shadow:0 0 10px rgba(168,85,247,0.3);
}

.price{
font-size:18px;
font-weight:bold;
}

.up{color:#22c55e}
.down{color:#ef4444}

input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:10px;
outline:none;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#a855f7;
color:white;
}

.small{
font-size:13px;
opacity:0.8;
}
</style>
</head>

<body>

<div id="app">

<h1>💜 نابینو کریپتو</h1>

<input id="search" placeholder="جستجوی ارز (مثل bitcoin)">
<button onclick="searchCoin()">جستجو</button>

<div id="result"></div>

<h3>📊 ارزهای اصلی</h3>

<div id="list"></div>

</div>

<script>

const coins = [
"bitcoin",
"ethereum",
"solana",
"tether"
];

async function fetchPrice(ids){
const res = await fetch(
`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`
);
return await res.json();
}

function render(data){
const list = document.getElementById("list");
list.innerHTML = "";

Object.keys(data).forEach(key=>{

let change = data[key].usd_24h_change.toFixed(2);
let color = change >= 0 ? "up" : "down";

list.innerHTML += `
<div class="card">
<div class="price">${key.toUpperCase()}</div>
<div>$${data[key].usd}</div>
<div class="${color}">${change}%</div>
</div>
`;
});
}

async function load(){
const data = await fetchPrice(coins.join(","));
render(data);
}

load();
setInterval(load,15000);

async function searchCoin(){
let coin = document.getElementById("search").value.toLowerCase();

if(!coin) return;

try{
const data = await fetch(
`https://api.coingecko.com/api/v3/simple/price?ids=${coin}&vs_currencies=usd&include_24hr_change=true`
);

const json = await data.json();

document.getElementById("result").innerHTML = `
<div class="card">
<div class="price">${coin.toUpperCase()}</div>
<div>$${json[coin].usd}</div>
<div>${json[coin].usd_24h_change.toFixed(2)}%</div>
</div>
`;
}catch(e){
document.getElementById("result").innerHTML =
"<div class='card'>ارز پیدا نشد ❌</div>";
}
}

</script>

</body>
</html>
