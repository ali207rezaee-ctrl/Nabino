<!DOCTYPE html><html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سفر فضایی نابینو</title><style>
body{
margin:0;
background:linear-gradient(#0b001a,#2a004f);
font-family:tahoma;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#game{
width:360px;
height:640px;
background:radial-gradient(circle at top,#3a0a66,#0b001a);
border-radius:20px;
box-shadow:0 0 30px #a855f7;
position:relative;
overflow:hidden;
padding:15px;
}

h1{
text-align:center;
text-shadow:0 0 10px #fff;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#a855f7;
color:white;
font-size:16px;
}

.choice{
margin-top:10px;
padding:12px;
background:#2e1065;
border-radius:12px;
cursor:pointer;
text-align:center;
}

#text{
margin-top:20px;
line-height:1.8;
min-height:120px;
}

#stats{
position:absolute;
bottom:10px;
left:0;
right:0;
text-align:center;
font-size:14px;
opacity:0.9;
}
</style></head><body><div id="game">
<h1>🚀 سفر فضایی نابینو</h1><div id="text">در حال آماده‌سازی سفینه...</div><div id="choices"></div><div id="stats"></div><button onclick="startGame()">شروع ماجراجویی</button>

</div><script>

// ---------- AUDIO ----------
let audioCtx;
function beep(freq,duration=0.1,type="sine"){
if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();

osc.type = type;
osc.frequency.value = freq;

gain.gain.value = 0.05;

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
osc.stop(audioCtx.currentTime + duration);
}

// ---------- GAME STATE ----------
let state;

function startGame(){
beep(440);

state = {
fuel: 100,
step: 0,
alive: true
};

nextStep();
}

// ---------- EVENTS ----------
const events = [
{
text:"💥 شهاب‌سنگ نزدیک شد!",
choices:[
{t:"انحراف سریع", f:-5, n:1},
{t:"استفاده از سپر", f:-10, n:2}
]
},
{
text:"🪐 سیاره ناشناخته دیده شد",
choices:[
{t:"فرود بیا", f:-15, n:2},
{t:"ادامه مسیر", f:-5, n:1}
]
},
{
text:"⚡ طوفان فضایی!",
choices:[
{t:"عبور مستقیم", f:-20, n:2},
{t:"صبر کن", f:-10, n:1}
]
},
{
text:"👽 سیگنال ناشناس دریافت شد",
choices:[
{t:"پاسخ بده", f:-10, n:1},
{t:"نادیده بگیر", f:-5, n:1}
]
},
{
text:"🛸 کشف مسیر کوتاه‌تر!",
choices:[
{t:"استفاده کن", f:-10, n:2},
{t:"مسیر امن", f:-5, n:1}
]
}
];

function nextStep(){

if(state.fuel <= 0){
return endGame("سوخت تمام شد 💀");
}

if(state.step >= 15){
return endGame("به زمین رسیدی 🟢 موفق شدی!");
}

let e = events[Math.floor(Math.random()*events.length)];
state.current = e;

render(e);
updateStats();
}

// ---------- RENDER ----------
function render(event){

document.getElementById("text").innerHTML = event.text;

let box = document.getElementById("choices");
box.innerHTML = "";

event.choices.forEach(c=>{
let div = document.createElement("div");
div.className = "choice";
div.innerText = c.t;

div.onclick = ()=>{
beep(600);

state.fuel += c.f;
state.step++;

nextStep();
};

box.appendChild(div);
});
}

// ---------- STATS ----------
function updateStats(){
document.getElementById("stats").innerText =
"🔋 سوخت: " + state.fuel + " | 🌌 مرحله: " + state.step;
}

// ---------- END ----------
function endGame(msg){
beep(200,0.3,"sawtooth");

document.getElementById("text").innerHTML =
"💥 " + msg;

document.getElementById("choices").innerHTML = `
<button onclick="startGame()">🔄 شروع دوباره</button>
`;

document.getElementById("stats").innerHTML = "";
}

</script></body>
</html>
